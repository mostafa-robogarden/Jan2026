<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Create an Account:</h2>
        <form>
            <label for="username" class="red-label" id="user-label">Username: </label>
            <input class="form-control" id="username" required type="text" placeholder="Please enter your username..." maxlength="20" minlength="3"><br><br>
            <span id="username-error" class="error">please enter a valid username</span>
            <label class="red-label">Email: </label>
            <input class="form-control" id="email" type="email" placeholder="Please enter your email..."><br><br>
            <label>Age: </label>
            <input id="age-input" class="form-control" type="number" max="100" min="10" placeholder="eg: 25"><br><br>
            <label>Password: </label>
            <input class="form-control password-input" id="pass" type="password" placeholder="please enter your password..."><br><br>
            <label>Confirm Password: </label>
            <input id="confirm" class="form-control password-input"  type="password" placeholder="please enter your password..."><br><br>
            <input id="show" type="checkbox">
            <label>Show Password</label><br><br>
            <label>Gender:</label>
            <input id="male" type="radio" name="gender">Male
            <input id="female" type="radio" name="gender">Female<br><br>
            <label>Role: </label>
            <select id="role" class="form-control" >
                <option selected disabled>Select a role</option>
                <option>User</option>
                <option>Manager</option>
            </select><br><br>
            <input id="subscribe" type="checkbox">
            <label>subscribe to newsletter</label><br><br>
            <a class="nav-link" href="index.html">Already have an account? Login here</a><br><br>
            <button id="submit" class="submit" type="button">Register</button>
        </form>
    </div>
    <script>
        $(document).ready(function() {
            console.log('ready');
            $('#submit').on('click', function() {
                let error = false;
                const username = $('#username').val();
                const age = $('#age-input').val();
                const dataToSend = {name: username, age: age};
                console.log(dataToSend);
                $.ajax({
                    type: 'POST',
                    url: 'http://localhost:3000/users',
                    data: JSON.stringify(dataToSend),
                    dataType: 'json',
                    success: function(data) {
                        console.log(data);
                    },
                    error: function(error) {
                        console.log(error);
                    }
                });
            });
            $('#show').click(function() {
                const passwordElemnts = $('.password-input');
                if($('#show').prop('checked')) {
                    for(element of passwordElemnts) {
                        element.type = 'text';
                    }
                }
                else {
                    for(element of passwordElemnts) {
                        element.type = 'password';
                    }
                }
            });
        });
        function ShowPassword() {
            const passwordElemnts = document.getElementsByClassName('password-input');
            if(document.getElementById('show').checked) {
                for(element of passwordElemnts) {
                    element.type = 'text';
                }
            }
            else {
                for(element of passwordElemnts) {
                    element.type = 'password';
                }
            }
        }
        function Submit() {
            let error = false;
            const username = document.getElementById('username').value;
            const password = document.getElementById('pass').value;
            const confirmPassword = document.getElementById('confirm').value;
            const email = document.getElementById('email').value;
            const age = document.getElementById('age-input').value;
            const gender = document.getElementById('male').checked ? true : false;
            const isSubscribed = document.getElementById('subscribe').checked;
            if(password !== confirmPassword)
                error = true;
            if(username.length < 5) {
                document.getElementById('username-error').style.display = 'block';
                error = true;
            }
            else {
                document.getElementById('username-error').style.display = 'none';
            }
            if(error) {
                console.log('failed to submit');
                return;
            }
            const dataToSend = {username: username, password: password, age: age};
        }
    </script>
</body>
</html>
