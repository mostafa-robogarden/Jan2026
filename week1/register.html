<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Create an Account:</h2>
        <form>
            <label for="username" class="red-label" id="user-label">Username: </label>
            <input class="form-control" id="username" required type="text" placeholder="Please enter your username..." maxlength="20" minlength="3"><br><br>
            <label class="red-label">Email: </label>
            <input class="form-control"  type="email" placeholder="Please enter your email..."><br><br>
            <label>Age: </label>
            <input id="age-input" class="form-control" t type="number" max="100" min="10" placeholder="eg: 25"><br><br>
            <label>Password: </label>
            <input class="form-control"  type="password" placeholder="please enter your password..."><br><br>
            <label>Confirm Password: </label>
            <input class="form-control"  type="password" placeholder="please enter your password..."><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female<br><br>
            <label>Role: </label>
            <select class="form-control" >
                <option selected disabled>Select a role</option>
                <option>User</option>
                <option>Manager</option>
            </select><br><br>
            <input type="checkbox">
            <label>subscribe to newsletter</label><br><br>
            <a class="nav-link" href="index.html">Already have an account? Login here</a><br><br>
            <button class="submit" type="submit">Register</button>
        </form>
    </div>
</body>
</html>
