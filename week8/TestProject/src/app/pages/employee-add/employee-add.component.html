<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="h4 mb-3">Add Employee</h2>

    @if (error) {
      <div class="alert alert-danger">{{ error }}</div>
    }

    @if (success) {
      <div class="alert alert-success">{{ success }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="username"
          name="username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password">
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="role"
          name="role">
      </div>

      <button class="btn btn-success me-2" type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Save' }}
      </button>

      <a routerLink="/employees" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
