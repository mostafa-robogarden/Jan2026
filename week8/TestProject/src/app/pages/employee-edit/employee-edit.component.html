<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="h4 mb-3">Edit Employee</h2>

    @if (loading) {
      <div class="alert alert-info">Loading employee...</div>
    }

    @if (error) {
      <div class="alert alert-danger">{{ error }}</div>
    }

    @if (success) {
      <div class="alert alert-success">{{ success }}</div>
    }

    @if (!loading) {
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            [value]="username"
            disabled>
        </div>

        <div class="mb-3">
          <label class="form-label">Role</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="role"
            name="role">
        </div>

        <div class="mb-3">
          <label class="form-label">New Password (optional)</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password">
        </div>

        <button class="btn btn-primary me-2" type="submit" [disabled]="saving">
          {{ saving ? 'Updating...' : 'Update' }}
        </button>

        <a routerLink="/employees" class="btn btn-secondary">Cancel</a>
      </form>
    }
  </div>
</div>
